<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicializando | verfutbolYa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass-panel max-w-md w-full rounded-2xl p-8 text-center shadow-2xl">
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                <svg class="w-8 h-8 text-indigo-400 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
        </div>
        
        <h1 class="text-2xl font-semibold mb-2 text-slate-100">{{ match_title }}</h1>
        <p class="text-slate-400 text-sm mb-8">Conectando con el servidor de transmisión...</p>

        <form method="post" action="/embed" class="w-full">
            <input type="hidden" name="stream_url" value="{{ stream_url|e }}">
            <input type="hidden" name="match_title" value="{{ match_title|e }}">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3.5 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                Acceder al Reproductor
            </button>
        </form>

        <div class="mt-6">
            <a href="#" id="openNewTabBtn" class="text-slate-500 hover:text-indigo-400 text-sm transition font-medium flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                Abrir reproductor en nueva pestaña
            </a>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-800">
            <a href="javascript:history.back()" class="text-xs text-slate-500 hover:text-slate-300">← Volver a la agenda</a>
        </div>
    </div>

    <script>
        document.getElementById('openNewTabBtn')?.addEventListener('click', function(e) {
            e.preventDefault();
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/embed';
            form.target = '_blank';
            
            const urlField = document.createElement('input');
            urlField.type = 'hidden';
            urlField.name = 'stream_url';
            urlField.value = '{{ stream_url|e }}';
            
            const titleField = document.createElement('input');
            titleField.type = 'hidden';
            titleField.name = 'match_title';
            titleField.value = '{{ match_title|e }}';
            
            form.appendChild(urlField);
            form.appendChild(titleField);
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
            
            // Opcional: Redirigir la pestaña actual de vuelta al inicio tras abrir en nueva
            setTimeout(() => { window.location.href = "/"; }, 500);
        });
    </script>
</body>
</html>
