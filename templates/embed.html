<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>En Vivo | {{ match_title }}</title>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','system-ui','-apple-system','Segoe UI','Roboto'], display: ['Montserrat','Poppins'] } } } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/site-theme.css">
</head>
<body class="min-h-screen flex flex-col">
    
    <header id="site-header" class="glass-header sticky top-0 z-50 w-full">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="javascript:history.back()" class="text-slate-400 hover:text-white transition flex items-center justify-center p-1.5 rounded-md hover:bg-slate-800">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                </a>
                <div class="h-4 w-px bg-slate-700"></div>
                <h1 class="text-sm font-semibold text-slate-200 truncate max-w-[200px] md:max-w-md">{{ match_title }}</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-indigo-500/10 border border-indigo-500/20 text-xs font-medium text-indigo-400">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    Directo
                </span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col justify-center items-center p-4 md:p-6 w-full">
        <div class="w-full max-w-5xl mx-auto bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-800 relative aspect-video">
            <iframe src="{{ stream_url }}" frameborder="0" allowfullscreen class="absolute top-0 left-0 w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>

        <div class="mt-6 flex flex-wrap justify-center gap-6 text-xs text-slate-500 font-medium">
            <button onclick="location.reload();" class="flex items-center gap-1.5 hover:text-slate-300 transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                Recargar reproductor
            </button>
            <a href="/" class="flex items-center gap-1.5 hover:text-slate-300 transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                Cambiar de fuente
            </a>
        </div>
    </main>

    <script>
        // Measure header height and set CSS variable so main has spacing below header
        (function(){
            var hdr = document.getElementById('site-header');
            if(!hdr) return;
            function updateHeader(){
                var h = Math.ceil(hdr.getBoundingClientRect().height) || 56;
                document.documentElement.style.setProperty('--site-header-height', h + 'px');
            }
            updateHeader();
            window.addEventListener('resize', updateHeader, {passive:true});
            if(window.ResizeObserver){
                try{ new ResizeObserver(updateHeader).observe(hdr);}catch(e){}
            }
        })();
    </script>
    <script>
        // Robust smart-hide header for embed: hide on scroll down (past threshold), always show on scroll up
        (function(){
            const hdr = document.getElementById('site-header');
            if(!hdr) return;
            let prev = window.scrollY || 0;
            let ticking = false;
            const hideThreshold = 100;

            function onScroll(){
                const curr = window.scrollY || 0;
                const delta = curr - prev;
                if(delta > 0 && curr > hideThreshold){
                    hdr.style.willChange = 'transform';
                    hdr.style.transform = 'translateY(-100%)';
                    hdr.style.transition = 'transform 220ms ease';
                } else if(delta < 0){
                    hdr.style.willChange = 'transform';
                    hdr.style.transform = 'translateY(0)';
                    hdr.style.transition = 'transform 180ms ease';
                }
                prev = curr;
                if(curr === 0){ hdr.style.transform = ''; }
            }

            window.addEventListener('scroll', function(){
                if(!ticking){ requestAnimationFrame(function(){ onScroll(); ticking = false; }); ticking = true; }
            }, {passive:true});
            window.addEventListener('touchstart', function(e){ lastTouchY = e.touches[0].clientY; }, {passive:true});
            window.addEventListener('touchmove', function(e){
                var ty = e.touches[0].clientY; if(typeof lastTouchY === 'undefined') lastTouchY = ty; if(ty - lastTouchY > 5) { hdr.style.transform = 'translateY(0)'; }
            }, {passive:true});
        })();
    </script>
</body>
</html>
